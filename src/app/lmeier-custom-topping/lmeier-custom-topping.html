<mat-card
    appearance="outlined"
>
    <mat-card-header>
        <mat-card-title>
            Add a Custom Topping
        </mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <mat-form-field>
            <mat-label>Custom Topping</mat-label>
            <input 
                matInput
                [value]= "customTopping()"
                (input)="customTopping.set($any($event.target).value)"
                >
  </mat-form-field>

        <button
        matButton="elevated"
        (click)="addTopping()"
        >
            Add
        </button>
        <br>

    
        @for (t of customToppingList(); track t) {
      <div>
        <ul>
            <li>{{ t }}</li>
        </ul>
      </div>
    }
    
    </mat-card-content>
</mat-card>
