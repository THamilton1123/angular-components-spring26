<mat-card
    appearance="outlined"
>
    <mat-card-header>
        <mat-card-title>Roll the dice</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <button
            matButton="outlined"
            (click)="rollDice()"
        >
            Roll
        </button>
    </mat-card-content>
</mat-card>
