<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title> Choose your pizza toppings... </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <button
      matButton="outlined"
      (click)="checkAll()"
    >
      All
    </button>
    &nbsp;
    <button
      matButton="outlined"
      (click)="unCheckAll()"
    >
      None
    </button>
    <br />
    <br />
    @for (t of availablePizzaToppings(); track t) {
      <div>
        <label>
          <input type="checkbox" [checked]="t.checked" (change)="toggleTopping(t)" />
          {{ t.name }} ({{ t.price | currency }})
        </label>
      </div>
    }
    <h3>Total: {{ total() | currency }}</h3>
  </mat-card-content>
</mat-card>
